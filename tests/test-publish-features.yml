name: Test publish features inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          publish-features: 'false'
          base-path-to-features: 'src/features'
          oci-registry: 'ghcr.io'
          features-namespace: 'myorg/features'
          disable-repo-tagging: 'true'
          generate-docs: 'false'
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "Action completed with features inputs"
          echo "PASS"
