name: Test publish features inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          publish-features: 'true'
          base-path-to-features: 'src/features'
          oci-registry: 'ghcr.io'
          features-namespace: 'test-org/features'
          disable-schema-validation: 'false'
          disable-repo-tagging: 'true'
          generate-docs: 'false'
        continue-on-error: true
      - name: Assert action ran with features inputs
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action will fail because there are no actual features to publish
          # and no OCI credentials, but it must have run (not skipped)
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action ran with oci-registry and features-namespace inputs, outcome=$OUTCOME"
