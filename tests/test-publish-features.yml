name: Test publish features inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create minimal feature structure
        run: |
          mkdir -p src/hello
          cat > src/hello/devcontainer-feature.json <<'EOF'
          {
            "id": "hello",
            "version": "1.0.0",
            "name": "Hello Feature",
            "description": "A minimal test feature"
          }
          EOF
          cat > src/hello/install.sh <<'EOF'
          #!/bin/bash
          echo "Hello!"
          EOF
      - id: action
        uses: .
        with:
          publish-features: 'false'
          base-path-to-features: src
          oci-registry: ghcr.io
          features-namespace: myorg/features
          disable-schema-validation: 'false'
          disable-repo-tagging: 'true'
          validate-only: 'true'
        continue-on-error: true
      - name: Assert action ran with features inputs
        run: |
          echo "Action completed with features inputs (oci-registry, features-namespace)"
          echo "PASS"
