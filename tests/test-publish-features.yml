name: Test publish features inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          publish-features: 'true'
          base-path-to-features: 'src/features'
          oci-registry: 'ghcr.io'
          features-namespace: 'my-org/features'
          disable-repo-tagging: 'true'
          disable-schema-validation: 'true'
        continue-on-error: true
      - name: Assert action ran with features inputs
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          # The action will likely fail without real credentials/features,
          # but we verify it ran and processed the inputs
          if [ -z "${{ steps.action.outcome }}" ]; then
            echo "FAIL: action did not produce an outcome"
            exit 1
          fi
          echo "PASS: action ran with oci-registry and features-namespace inputs, outcome=${{ steps.action.outcome }}"
