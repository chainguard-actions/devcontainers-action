name: Test publish features inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          publish-features: 'true'
          base-path-to-features: 'src'
          oci-registry: 'ghcr.io'
          features-namespace: 'test-org/features'
          disable-schema-validation: 'false'
          disable-repo-tagging: 'true'
          generate-docs: 'false'
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          # The action may fail due to missing OCI credentials or no features found,
          # but it must not be skipped — it must have actually executed.
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran with oci-registry and features-namespace inputs (outcome=${{ steps.action.outcome }})"
