name: Test publish features inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create minimal feature structure
        run: |
          mkdir -p src/myfeature
          cat > src/myfeature/devcontainer-feature.json <<'EOF'
          {
            "id": "myfeature",
            "version": "1.0.0",
            "name": "My Feature",
            "description": "A test feature"
          }
          EOF
      - id: action
        uses: .
        with:
          publish-features: 'false'
          base-path-to-features: src
          oci-registry: ghcr.io
          features-namespace: test-org/features
          validate-only: 'true'
          disable-schema-validation: 'false'
          disable-repo-tagging: 'true'
          generate-docs: 'false'
      - name: Assert action completed
        run: |
          echo "publish-features inputs accepted"
          echo "PASS"
