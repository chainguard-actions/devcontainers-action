name: Test publish features inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          publish-features: 'true'
          base-path-to-features: 'src'
          oci-registry: 'ghcr.io'
          features-namespace: 'test-org/features'
          disable-repo-tagging: 'true'
        continue-on-error: true
      - name: Assert action was invoked with oci-registry and features-namespace
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          # The action will fail without valid credentials/features, but we verify
          # it was invoked with the correct inputs (oci-registry, features-namespace)
          echo "PASS: action invoked with publish-features inputs including oci-registry and features-namespace"
