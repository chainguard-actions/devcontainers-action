name: Test generate-docs mode
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          generate-docs: 'true'
          base-path-to-features: 'src'
        continue-on-error: true
      - name: Assert action was invoked with generate-docs input
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          # The action may fail without valid features, but we verify
          # it was invoked with the generate-docs input
          echo "PASS: action invoked with generate-docs input"
