name: Test generate-docs mode
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          generate-docs: 'true'
          devcontainer-cli-version: ''
          disable-schema-validation: 'true'
          disable-repo-tagging: 'true'
          validate-only: 'false'
        continue-on-error: true
      - name: Assert action ran with generate-docs input
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action may fail due to missing features/templates dirs,
          # but it must have run (not skipped)
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action ran with generate-docs=true, outcome=$OUTCOME"
