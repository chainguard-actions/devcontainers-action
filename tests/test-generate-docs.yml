name: Test generate-docs input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          generate-docs: 'true'
          devcontainer-cli-version: ''
          validate-only: 'true'
        continue-on-error: true
      - name: Assert action was invoked with generate-docs input
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          # The action may fail due to missing features/templates dirs,
          # but it must have been invoked with the generate-docs input.
          echo "PASS: action was invoked with generate-docs and devcontainer-cli-version inputs"
