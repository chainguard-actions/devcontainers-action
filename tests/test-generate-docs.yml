name: Test generate-docs and cli-version inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create minimal feature structure
        run: |
          mkdir -p src/hello/
          cat > src/hello/devcontainer-feature.json <<'EOF'
          {
            "id": "hello",
            "version": "1.0.0",
            "name": "Hello Feature",
            "description": "A minimal test feature"
          }
          EOF
      - id: action
        uses: .
        with:
          generate-docs: 'true'
          devcontainer-cli-version: 'latest'
          validate-only: 'true'
          base-path-to-features: src
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          echo "PASS: action completed with outcome ${{ steps.action.outcome }}"
