name: Test generate-docs and cli-version inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          generate-docs: 'true'
          devcontainer-cli-version: 'latest'
          validate-only: 'true'
          disable-schema-validation: 'true'
        continue-on-error: true
      - name: Assert action ran with generate-docs input
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          # The action may fail without features/templates present,
          # but we verify it ran and processed the inputs
          if [ -z "${{ steps.action.outcome }}" ]; then
            echo "FAIL: action did not produce an outcome"
            exit 1
          fi
          echo "PASS: action ran with generate-docs and devcontainer-cli-version inputs, outcome=${{ steps.action.outcome }}"
