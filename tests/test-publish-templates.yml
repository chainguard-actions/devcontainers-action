name: Test publish-templates inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          publish-templates: 'true'
          base-path-to-templates: 'src/templates'
          oci-registry-for-templates: 'ghcr.io'
          templates-namespace: 'test-org/templates'
          disable-repo-tagging: 'true'
        continue-on-error: true
      - name: Assert action was invoked with template publishing inputs
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          # The action may fail due to missing registry credentials or missing templates dir,
          # but it must have been invoked with all the required inputs.
          echo "PASS: action was invoked with oci-registry-for-templates and templates-namespace inputs"
