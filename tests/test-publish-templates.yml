name: Test publish templates inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          publish-templates: 'false'
          base-path-to-templates: 'src/templates'
          oci-registry-for-templates: 'ghcr.io'
          templates-namespace: 'myorg/templates'
          disable-repo-tagging: 'true'
          generate-docs: 'false'
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "Action completed with templates inputs"
          echo "PASS"
