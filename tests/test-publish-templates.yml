name: Test publish-templates inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          publish-templates: 'true'
          base-path-to-templates: 'src/templates'
          oci-registry-for-templates: 'ghcr.io'
          templates-namespace: 'test-org/templates'
          disable-schema-validation: 'false'
          disable-repo-tagging: 'true'
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          # The action may fail due to missing registry credentials or missing templates directory,
          # but it must not be skipped — it should have been invoked.
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran (outcome=${{ steps.action.outcome }})"
