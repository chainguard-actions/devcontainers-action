name: Test publish templates inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create minimal template structure
        run: |
          mkdir -p templates/my-template
          cat > templates/my-template/devcontainer-template.json <<'EOF'
          {
            "id": "my-template",
            "version": "1.0.0",
            "name": "My Template",
            "description": "A test template"
          }
          EOF
          mkdir -p templates/my-template/.devcontainer
          cat > templates/my-template/.devcontainer/devcontainer.json <<'EOF'
          {
            "name": "My Template"
          }
          EOF
      - id: action
        uses: .
        with:
          validate-only: 'true'
          publish-templates: 'false'
          base-path-to-templates: templates
          oci-registry-for-templates: ghcr.io
          templates-namespace: myorg/templates
      - name: Assert action completed successfully
        run: |
          echo "publish-templates inputs accepted"
          echo "PASS"
