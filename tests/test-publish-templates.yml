name: Test publish templates inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create minimal template structure
        run: |
          mkdir -p templates/hello/
          cat > templates/hello/devcontainer-template.json <<'EOF'
          {
            "id": "hello",
            "version": "1.0.0",
            "name": "Hello Template",
            "description": "A minimal test template"
          }
          EOF
          mkdir -p templates/hello/.devcontainer
          cat > templates/hello/.devcontainer/devcontainer.json <<'EOF'
          {
            "name": "Hello"
          }
          EOF
      - id: action
        uses: .
        with:
          publish-templates: 'true'
          base-path-to-templates: templates
          oci-registry-for-templates: ghcr.io
          templates-namespace: test-org/templates
          disable-repo-tagging: 'true'
        continue-on-error: true
      - name: Assert action ran (not skipped)
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran with oci-registry-for-templates and templates-namespace inputs"
