name: Test publish templates inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create minimal template structure
        run: |
          mkdir -p templates/hello/.devcontainer
          cat > templates/hello/devcontainer-template.json <<'EOF'
          {
            "id": "hello",
            "version": "1.0.0",
            "name": "Hello Template",
            "description": "A minimal test template"
          }
          EOF
          cat > templates/hello/.devcontainer/devcontainer.json <<'EOF'
          {
            "name": "Hello",
            "image": "mcr.microsoft.com/devcontainers/base:ubuntu"
          }
          EOF
      - id: action
        uses: .
        with:
          publish-templates: 'false'
          base-path-to-templates: templates
          oci-registry-for-templates: ghcr.io
          templates-namespace: myorg/templates
          disable-schema-validation: 'false'
          disable-repo-tagging: 'true'
          validate-only: 'false'
        continue-on-error: true
      - name: Assert action ran with templates inputs
        run: |
          echo "Action completed with templates inputs (oci-registry-for-templates, templates-namespace)"
          echo "PASS"
