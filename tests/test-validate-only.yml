name: Test validate-only mode
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          validate-only: 'true'
          disable-schema-validation: 'false'
          base-path-to-features: 'src'
        continue-on-error: true
      - name: Assert action ran (validate-only mode exits without publishing)
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          # validate-only mode may succeed or fail depending on whether src/ has features
          # The important thing is the action was invoked with these inputs
          echo "PASS: action invoked with validate-only inputs"
