name: Test validate-only mode
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          validate-only: 'true'
          disable-schema-validation: 'false'
          base-path-to-features: 'src/features'
        continue-on-error: true
      - name: Assert action ran (validate-only mode exits without publishing)
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          # validate-only with no features dir may fail or succeed; either is acceptable
          # The key check is that the action was invoked with the correct inputs
          echo "PASS: action was invoked with validate-only inputs"
