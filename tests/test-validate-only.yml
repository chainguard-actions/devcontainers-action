name: Test validate-only mode
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          validate-only: 'true'
          disable-schema-validation: 'false'
          generate-docs: 'false'
          disable-repo-tagging: 'false'
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          # validate-only mode should either succeed or fail gracefully
          # The action runs node16 and may exit with an error if no features/templates found
          # but it should not crash unexpectedly
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran (outcome=${{ steps.action.outcome }})"
