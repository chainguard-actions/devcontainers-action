name: Test validate-only mode
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          validate-only: 'true'
          disable-schema-validation: 'false'
          generate-docs: 'false'
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          # The action may fail if no features/templates are found, but it should at least start
          # We just verify the step executed (outcome is set)
          if [ -z "${{ steps.action.outcome }}" ]; then
            echo "FAIL: action did not produce an outcome"
            exit 1
          fi
          echo "PASS: action ran with outcome=${{ steps.action.outcome }}"
