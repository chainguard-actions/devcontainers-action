name: Test validate-only mode
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create minimal feature structure
        run: |
          mkdir -p src/hello/
          cat > src/hello/devcontainer-feature.json <<'EOF'
          {
            "id": "hello",
            "version": "1.0.0",
            "name": "Hello Feature",
            "description": "A minimal test feature"
          }
          EOF
      - id: action
        uses: .
        with:
          validate-only: 'true'
          base-path-to-features: src
          disable-schema-validation: 'false'
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped"
            exit 1
          fi
          echo "PASS: action ran (outcome=${{ steps.action.outcome }})"
